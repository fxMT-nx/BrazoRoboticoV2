# =============================================================================
# Drop-in para evitar que arduino-router.service resetee el STM32
#
# El servicio arduino-router.service (parte del BSP del UNO Q) ejecuta
# comandos en ExecStopPost y ExecStartPre que pueden resetear el STM32
# durante el arranque/apagado, causando pérdida de calibración.
#
# Instalación:
#   sudo mkdir -p /etc/systemd/system/arduino-router.service.d/
#   sudo cp 20-no-reset.conf /etc/systemd/system/arduino-router.service.d/
#   sudo systemctl daemon-reload
# =============================================================================
[Service]
# Eliminar comandos post-stop que puedan resetear el STM32
ExecStopPost=
# Eliminar comandos pre-start que puedan resetear el STM32
ExecStartPre=
