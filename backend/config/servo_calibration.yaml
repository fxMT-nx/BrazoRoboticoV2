# Calibración de servos MG996R — CALIBRADA MANUALMENTE 2026-05-18
# Unidades: microsegundos PWM (rango típico 500-2500)
# Rango seguro calibrado físicamente sobre el brazo real

fingers:
  thumb:
    open_pwm: 2000
    closed_pwm: 800
    pwm_min: 700
    pwm_max: 2100
    deadband_pwm: 15
    invert: false
  index:
    open_pwm: 2000
    closed_pwm: 600
    pwm_min: 500
    pwm_max: 2100
    deadband_pwm: 15
    invert: false
  middle:
    open_pwm: 1700
    closed_pwm: 600
    pwm_min: 500
    pwm_max: 1800
    deadband_pwm: 15
    invert: false
  ring:
    open_pwm: 1900
    closed_pwm: 600
    pwm_min: 500
    pwm_max: 2000
    deadband_pwm: 15
    invert: false
  pinky:
    open_pwm: 1900
    closed_pwm: 600
    pwm_min: 500
    pwm_max: 2000
    deadband_pwm: 15
    invert: false
  wrist:
    open_pwm: 2000
    closed_pwm: 600
    pwm_min: 700
    pwm_max: 2000
    deadband_pwm: 15
    invert: false

safe_pose_pwm: 1300  # Centro real de la muñeca
safe_pose_fallback_ms: 2000
