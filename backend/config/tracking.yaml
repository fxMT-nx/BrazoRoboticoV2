# Configuración de tracking de mano y mapeo a PWM

mediapipe:
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 1
  model_complexity: 1  # 0=lite, 1=full, 2=heavy

smoothing:
  ema_alpha: 0.20
  max_change_per_frame: 50  # era 5 - elimina el cuello de botella del rate limiter

pose_mapper:
  sensitivity: 0.85         # Escala de sensibilidad (0.0-1.0)
  # Pulgar: comparación eje X entre tip(4) e IP(3) para detectar abierto/cerrado
  thumb_x_threshold: 0.02   # Diferencia X normalizada para detectar abducción

serial:
  protocol: "F<idx> <pwm_us>\n"  # Formato de comando
  host: "127.0.0.1"
  port: 7500
  baudrate: 115200
  reconnect_attempts: 10
  reconnect_delay_s: 0.5
  heartbeat_interval_ms: 500
  heartbeat_timeout_ms: 2000
  debug_log_every_n: 10     # Log cada N comandos
