# Configuración de tracking de mano y mapeo a PWM
# Actualizado: 2026-05-18 — sensibilidad al máximo

mediapipe:
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  max_num_hands: 1
  model_complexity: 1  # 0=lite, 1=full, 2=heavy

smoothing:
  ema_alpha: 0.20
  max_change_per_frame: 50

pose_mapper:
  sensitivity: 1.0           # Máxima sensibilidad
  thumb_x_threshold: 0.02

serial:
  protocol: "F<idx> <pwm_us>\n"
  host: "127.0.0.1"
  port: 7500
  baudrate: 115200
  reconnect_attempts: 10
  reconnect_delay_s: 0.5
  heartbeat_interval_ms: 500
  heartbeat_timeout_ms: 2000
  debug_log_every_n: 10
